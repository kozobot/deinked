# Local conda environment for the deinked segment-and-inpaint tattoo remover.
#
# Create/update with:
#   mamba env create -f environment.yml      # first time
#   mamba env update -f environment.yml      # after edits
#   conda activate deinked
#
# Target GPU: NVIDIA RTX 5070 Ti (Blackwell, sm_120, 16 GB), driver >= 570.
# PyTorch is pulled from the CUDA 12.8 wheel index, which ships sm_120 kernels.
name: deinked
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # --- PyTorch (Blackwell / sm_120 build) ---
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch
      - torchvision
      # --- Foundation models: detection + segmentation + inpainting ---
      - transformers>=4.44        # GroundingDINO + SAM + depth estimation live here (no CUDA-ext)
      - diffusers>=0.32           # SDXL / SDXL+ControlNet / FLUX.1 Fill inpainting pipelines (GGUF-aware)
      # The "sdxl_controlnet" backend needs no new package — its SDXL depth ControlNet
      # (diffusers/controlnet-depth-sdxl-1.0-small) and depth model (Depth-Anything-V2-Small) are
      # un-gated weights that download lazily on first use (no `hf auth`).
      - accelerate
      - safetensors
      - gguf                      # GGUF-quantized FLUX.1 Fill transformer loader
      - simple-lama-inpainting    # LaMa baseline inpainter (torchscript weights)
      # --- Imaging / app ---
      - opencv-python
      - Pillow
      - numpy
      - marimo                    # reactive notebook / app UI
